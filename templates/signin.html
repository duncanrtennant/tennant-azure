      <!-- Register Modal -->
      <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
        <!-- Using bootstra's modal dialog class  -->
        <div class="modal-dialog">
          <!-- And this class holds the modal's content-->
          <div class="modal-content">
            <!-- This is the header of the modal -->
            <div class="modal-header">
              <!-- This is the title of the modal -->
              <h5 class="modal-title" id="registerModalLabel">Register</h5>
              <!-- Add a close button to the header to dismiss the modal-->
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <!-- This is the body of the modal -->
            <div class="modal-body">
              <!-- It holds a form. A form is a special html element that interacts nicely with javascript. -->
              <!-- It allows for validation to be done partially via html. -->
              <form id="registerForm" novalidate>
                <div class="mb-3">
                  <label for="registerUsername" class="form-label">Username</label>

                  <!-- the form-control class adds in the form contents. -->
                  <input type="text" class="form-control" id="registerUsername" name="username" required pattern="^[a-zA-Z0-9]{1,20}$" />
                  <div class="invalid-feedback">Username must be alphanumeric and at most 20 characters.</div>
                </div>
                <div class="mb-3">
                  <label for="registerPassword" class="form-label">Password</label>

                  <!-- The pattern  below uses regular expressions. If you aren't familiar with regular expressions, you can look them up.-->
                  <!-- \x21-\x7E defines a range of ascii characters between ! and ~. -->
                  <!-- {8,} means that it must be at least 8 characters -->
                  <!-- https://ss64.com/ascii.html has the list of ascii character codes -->
                  <input type="password" class="form-control" id="registerPassword" name="password" required pattern="^[\x21-\x7E]{8,}$" />
                  <div class="invalid-feedback">Password must be at least 8 characters and contain no whitespace.</div>
                </div>
                <div class="mb-3">
                  <label for="displayName" class="form-label">Display Name</label>
                  <input type="text" class="form-control" id="registerDisplayName" name="displayName" required />
                </div>
                <button type="submit" class="btn btn-primary">Register</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              </form>
            </div>
          </div>
        </div>
      </div>
